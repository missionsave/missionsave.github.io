	function gtElInit() {
		 lib = new google.translate.TranslateService();

		 // 1) Prefer the first full tag from navigator.languages
		const fromLanguages = (navigator.languages || []).find(l => l.includes('-'));

		// 2) Fallback: Intl often canonicalizes to a regioned locale
		const fromIntl = Intl?.DateTimeFormat?.().resolvedOptions().locale;

		// 3) Last resort: plain navigator.language
		const fromNav = navigator.language;
		const raw = fromLanguages || (fromIntl?.includes('-') ? fromIntl : fromNav);

		// Normalize casing like "pt-PT"
		const locale = raw.split('-').map((p,i) => i ? p.toUpperCase() : p.toLowerCase()).join('-');
		console.log('Detected locale:', locale);
		//  menut("en-US");
		//  menut("pt-PT");
		 menut(locale);
	}

function fixCommaInsideSpan(html) {
  // aceita vírgula ou ponto
 
  // Caso 1: </span><span class="x">,
  html = html.replace(
    /<\/span>\s*<span([^>]*)>\s*([,.])\s*<\/span>/g,
    "$2</span><span$1> "
  );

  // Caso 2: </span><span class="x">,texto
  html = html.replace(
    /<\/span>\s*<span([^>]*)>\s*([,.])\s*/g,
    "$2</span><span$1> "
  );

  // Caso 3: texto<span class="x">,</span>
  html = html.replace(
    /<span([^>]*)>\s*([,.])\s*<\/span>/g,
    "$2<span$1></span> "
  );

  return html;
}

function loadPage_v2(url) {
  fetch(url)
    .then(r => r.text())
    .then(html => {
	  html=fixCommaInsideSpan(html);  

	//   console.log(html);

      const viewer_v1 = document.getElementById('viewer_v1');

      const tmp = document.createElement('div');
      tmp.innerHTML = html; 

      const scripts = Array.from(tmp.querySelectorAll('script'));
      scripts.forEach(s => s.remove());

      // CSS applied only to loaded HTML
		const styleFix = `
		<style>
		.loaded_page_root, .loaded_page_root *{
		max-width:100% !important;
		box-sizing:border-box;
		}

		.loaded_page_root img{
		width:100% !important;
		height:auto !important;
		max-width:100% !important;
		display:block;
		}
		
		</style>
		`;

      // wrap loaded HTML
      viewer_v1.innerHTML = styleFix + `<div class="loaded_page_root">${tmp.innerHTML}</div>`;
// console.log(viewer_v1.innerHTML);

// Select all elements with classes that have padding
viewer_v1.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(el => {
  el.style.paddingTop = '4px';
  el.style.paddingBottom = '1px';
//   el.style.marginTop = '0';
//   el.style.marginBottom = '0';
});
viewer_v1.querySelectorAll('ul, li').forEach(el => {
  el.style.paddingTop = '2px';
  el.style.paddingBottom = '2px';
//   el.style.marginTop = '0';
//   el.style.marginBottom = '0';
});


      // Force images responsive
      viewer_v1.querySelectorAll('.loaded_page_root img').forEach(img => {
        img.removeAttribute('width');
        img.removeAttribute('height');
        img.style.setProperty('max-width', '100%', 'important');
        img.style.setProperty('height', 'auto', 'important');

        const span = img.closest('span');
        if (span) {
          span.style.removeProperty('width');
          span.style.removeProperty('height');
          span.style.setProperty('max-width', '100%', 'important');
          span.style.setProperty('display', 'block', 'important');
        }
      });

      (function runScripts(i) {
        if (i >= scripts.length) return;

        const oldScript = scripts[i];
        const newScript = document.createElement('script');

        Array.from(oldScript.attributes).forEach(attr => {
          newScript.setAttribute(attr.name, attr.value);
        });

        if (oldScript.src) {
          newScript.src = new URL(oldScript.getAttribute('src'), url).href;
          newScript.onload = () => runScripts(i + 1);
          newScript.onerror = () => runScripts(i + 1);
          document.body.appendChild(newScript);
        } else {
          newScript.textContent = oldScript.textContent;
          document.body.appendChild(newScript);
          runScripts(i + 1);
        }

        onresizeFunction();
 
      })(0);
    })
    .catch(err => {
      console.error(err);
      document.getElementById('viewer_v1').innerHTML = "<p>Error loading page.</p>";
    });
}

// 2. Dropdown Toggle Function
window.dropdownFunction = function(id) {
    // Close other open dropdowns first
    const dropdowns = document.getElementsByClassName("dropdown-content");
    for (let i = 0; i < dropdowns.length; i++) {
        if (dropdowns[i].id !== id) {
            dropdowns[i].classList.remove('show');
        }
    }
    // Toggle the clicked one
    document.getElementById(id).classList.toggle("show");
};

// 3. Close dropdowns if user clicks outside
const myTopnav = document.getElementById("myTopnav");

window.onclick = function(event) {
    // ignore clicks on the button/icon that opens the menu
    if (event.target.matches('.dropbtn') || event.target.closest('.dropbtn')) return;

    // close dropdowns
    const dropdowns = document.getElementsByClassName("dropdown-content");
    for (let i = 0; i < dropdowns.length; i++) {
        dropdowns[i].classList.remove('show');
    }

    // if responsive menu is open, close it
	if (event.target.closest(".icon")) return;
    if (myTopnav.classList.contains('responsive')) {
        myTopnav.classList.remove('responsive');
    }
};



// 4. Main Loop to generate Nav
Object.entries(tdoc).forEach(([key, value]) => {
    if (key === "home") return;

    const navContainer = document.getElementById("myTopnav");

    if (Array.isArray(value) && value.length > 1) {
        // --- CREATE DROPDOWN ---
        const dropdownDiv = document.createElement("div");
        dropdownDiv.className = "dropdownc";

        const dropdownId = `dropdown-${key}`;
        
        const btn = document.createElement("button");
        btn.className = "dropbtn";
        btn.onclick = (e) => {
			if (myTopnav.classList.contains('responsive')){
				e.stopPropagation(); // Prevent immediate closing
				dropdownFunction(dropdownId);
			}
        };
        btn.innerHTML = `${key}  <i class="fa fa-caret-down"></i>`;
        
        const contentDiv = document.createElement("div");
        contentDiv.className = "dropdown-content";
        contentDiv.id = dropdownId;

        value.forEach(item => {
            const subLink = document.createElement("a");
            subLink.textContent = item.title || key; 
            subLink.href = `?p=${key}/${(item.title || "").replace(/\s+/g, '_')}`;
            
            subLink.addEventListener("click", (e) => {
                e.preventDefault();
                updateurl(subLink);
                loadPage_v2(workerapi + item.url);
                window.scrollTo(0, 0);
				// Hide any open menus right now
				document.querySelectorAll('.dropdown-content').forEach(function(el) { 
					el.style.display = 'none';    // inline-hide for desktop
					setTimeout(() => { el.style.display = ''; }, 500);
				}); 
            });
            contentDiv.appendChild(subLink);
        });

        dropdownDiv.appendChild(btn);
        dropdownDiv.appendChild(contentDiv);
        navContainer.appendChild(dropdownDiv);

    } else {
        // --- CREATE SINGLE LINK ---
        const url = Array.isArray(value) ? value[0].url : value;
        const link = document.createElement("a");
        link.textContent = key;
        link.href = `?p=${key}`;

        link.addEventListener("click", (e) => {
            e.preventDefault();
            updateurl(link);
            loadPage_v2(workerapi + url);
            window.scrollTo(0, 0);
        });
        navContainer.appendChild(link);
    }
});
