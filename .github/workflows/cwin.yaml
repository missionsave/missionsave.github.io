name: Alpha Factory

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: true
        default: 'hourly'
        type: choice
        options:
          - hourly
          - daily
          - weekly
  schedule:
    - cron: '0 0 * * *'    # daily at midnight UTC
    - cron: '0 3 * * 0'    # weekly Sunday 03:00 UTC

jobs:
  run-bot:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: write      # <-- ESSENCIAL para o push funcionar

    steps:
      - name: Checkout only needed files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            crbot/cwin
            crbot/state.json
          sparse-checkout-cone-mode: false

      - name: Make binary executable
        run: chmod +x crbot/cwin

      - name: Ensure state.json exists
        run: test -f crbot/state.json || echo '{}' > crbot/state.json

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 3 * * 0" ]; then
            echo "mode=weekly" >> $GITHUB_OUTPUT
          else
            echo "mode=hourly" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        run: ./cwin ${{ steps.mode.outputs.mode }}
        working-directory: ./crbot
        env:
          MEXC_API_KEY: ${{ secrets.MEXC_API_KEY }}
          MEXC_API_SECRET: ${{ secrets.MEXC_API_SECRET }}
          WB_KEY: ${{ secrets.WB_KEY }}
          WB_SECRET: ${{ secrets.WB_SECRET }}
          CG_KEY: ${{ secrets.CG_KEY }}

      - name: Commit state.json changes
        if: always()
        run: |
          git config user.name "alpha-bot"
          git config user.email "bot@localhost"
          git add -f crbot/state.json
          MSG="state: ${{ steps.mode.outputs.mode }} $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git diff --staged --quiet || git commit -m "$MSG"
          git push