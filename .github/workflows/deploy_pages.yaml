name: Deploy to GitHub Pages

on:
  workflow_dispatch:  # <-- Só manualmente, quando quiser
  # Opcional: pode adicionar push se quiser que seja automático apenas em certas condições
  # push:
  #   branches: [main]
  #   paths:
  #     - 'docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'  # ou a pasta onde estão os ficheiros do seu site
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4